<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد کاربری | نیک‌پلاس</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { vazir: ['Vazirmatn', 'sans-serif'] },
        colors: {
          cream: '#FAF9F5',
          ink: '#16231F',
          forest: '#1F5C52',
          forestDark: '#153F38',
          sage: '#7FA793',
          lagoon: '#4E9C93',
          mist: '#E7EFE9',
          coral: '#E8926A',
        }
      }
    }
  }
</script>
<style>
  * { font-family: 'Vazirmatn', sans-serif; }
  .spinner {
    border: 3px solid rgba(31,92,82,0.15);
    border-top-color: #1F5C52;
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-cream text-ink antialiased min-h-screen">

<!-- ===================== NAVBAR ===================== -->
<header class="sticky top-0 z-50 bg-cream/85 backdrop-blur-md border-b border-ink/[0.06]">
  <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
    <a href="index.html" class="flex items-center gap-2.5">
      <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="#1F5C52" stroke-width="1.4"/>
        <path d="M13 22c0-4 3-7 7-7s7 3 7 7-3 5-7 5-7-1-7-5Z" fill="#1F5C52"/>
        <circle cx="14.5" cy="14" r="2.1" fill="#1F5C52"/>
        <circle cx="19.5" cy="11.5" r="2.1" fill="#1F5C52"/>
        <circle cx="25.5" cy="14" r="2.1" fill="#1F5C52"/>
      </svg>
      <span class="text-lg font-extrabold tracking-tight text-forestDark">نیک‌پلاس</span>
    </a>
    <button id="logoutBtn" class="flex items-center gap-2 text-sm font-bold text-ink/60 hover:text-red-600 transition-colors">
      خروج از حساب
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </div>
</header>

<!-- ===================== LOADING STATE ===================== -->
<div id="pageLoading" class="flex flex-col items-center justify-center py-32 gap-4">
  <div class="spinner"></div>
  <p class="text-sm text-ink/40">در حال بارگذاری اطلاعات...</p>
</div>

<!-- ===================== MAIN CONTENT ===================== -->
<main id="pageContent" class="hidden max-w-5xl mx-auto px-6 py-10">

  <!-- greeting -->
  <div class="mb-9">
    <p class="text-sm text-ink/40 mb-1">خوش آمدید،</p>
    <h1 id="userName" class="text-2xl sm:text-3xl font-extrabold text-forestDark">کاربر عزیز</h1>
  </div>

  <!-- action bar -->
  <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 mb-8">
    <h2 class="text-lg font-bold text-forestDark">نوبت‌های من</h2>
    <a href="booking.html" class="bg-forest hover:bg-forestDark text-white font-bold px-6 py-3 rounded-xl transition-all shadow-lg shadow-forest/25 text-sm text-center flex items-center justify-center gap-2">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      رزرو نوبت جدید
    </a>
  </div>

  <!-- appointments list -->
  <div id="appointmentsList" class="space-y-4"></div>

  <!-- empty state -->
  <div id="emptyState" class="hidden text-center py-16 bg-white rounded-[2rem] border border-ink/[0.06]">
    <p class="text-ink/50 mb-5">هنوز هیچ نوبتی رزرو نکرده‌اید.</p>
    <a href="booking.html" class="inline-block bg-forest hover:bg-forestDark text-white font-bold px-7 py-3.5 rounded-xl transition-all shadow-lg shadow-forest/25 text-sm">
      رزرو اولین نوبت
    </a>
  </div>

  <!-- error state -->
  <p id="loadError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3 mt-4"></p>

</main>

<!-- ===================== EDIT MODAL ===================== -->
<div id="editModal" class="hidden fixed inset-0 z-[60] bg-ink/40 backdrop-blur-sm flex items-center justify-center px-4">
  <div class="bg-white rounded-[2rem] border border-ink/[0.06] shadow-xl max-w-md w-full p-7 max-h-[90vh] overflow-y-auto">
    <div class="flex items-center justify-between mb-5">
      <h3 class="text-lg font-bold text-forestDark">ویرایش نوبت</h3>
      <button id="closeModalBtn" class="text-ink/40 hover:text-ink/70 transition-colors">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>

    <div class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">تاریخ جدید</label>
        <input type="hidden" id="editDate">
        <div id="editDateMount"></div>
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-2">ساعت جدید</label>
        <div id="editSlots" class="grid grid-cols-4 sm:grid-cols-5 gap-2"></div>
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">نام حیوان خانگی</label>
        <input type="text" id="editPetName" class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm">
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">یادداشت</label>
        <textarea id="editNotes" rows="3" class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm"></textarea>
      </div>
    </div>

    <p id="editError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3 mt-4"></p>

    <button id="saveEditBtn" class="w-full mt-6 bg-forest hover:bg-forestDark text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-forest/25">
      ذخیره تغییرات
    </button>
  </div>
</div>

<script src="supabase-client.js"></script>
<script src="jalali.js"></script>
<script>
  let currentAppointments = [];

  const statusMap = {
    pending:   { label: 'در انتظار تایید', classes: 'bg-amber-50 text-amber-700' },
    confirmed: { label: 'تایید شده',       classes: 'bg-mist text-forest' },
    completed: { label: 'انجام شده',       classes: 'bg-ink/[0.06] text-ink/50' },
    cancelled: { label: 'لغو شده',         classes: 'bg-red-50 text-red-600' },
  };

  function formatDate(dateStr) {
    return JalaliUtil.formatJalaliDisplay(dateStr, true);
  }

  function actionButtons(appt) {
    if (appt.status === 'pending' || appt.status === 'confirmed') {
      return `
        <div class="flex gap-2 mt-3 sm:mt-0 shrink-0">
          <button data-edit="${appt.id}" class="edit-btn px-3.5 py-2 rounded-lg text-xs font-bold bg-mist text-forest hover:bg-forest hover:text-white transition-colors">ویرایش</button>
          <button data-cancel="${appt.id}" class="cancel-btn px-3.5 py-2 rounded-lg text-xs font-bold bg-red-50 text-red-600 hover:bg-red-100 transition-colors">لغو نوبت</button>
        </div>
      `;
    }
    return '';
  }

  function renderAppointments(appointments) {
    const list = document.getElementById('appointmentsList');
    const empty = document.getElementById('emptyState');

    if (!appointments || appointments.length === 0) {
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = appointments.map(appt => {
      const status = statusMap[appt.status] || { label: appt.status || 'نامشخص', classes: 'bg-ink/[0.06] text-ink/50' };
      const serviceTitle = appt.services?.title || 'خدمت نامشخص';
      const doctorName = appt.doctors?.profiles?.full_name;
      const doctorSpecialty = appt.doctors?.specialty;

      return `
        <div class="bg-white rounded-2xl border border-ink/[0.06] p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
          <div>
            <div class="flex items-center gap-2.5 mb-2">
              <h3 class="font-bold text-forestDark">${serviceTitle}</h3>
              <span class="text-xs font-bold px-2.5 py-1 rounded-full ${status.classes}">${status.label}</span>
            </div>
            <p class="text-sm text-ink/55">
              ${appt.pet_name ? 'حیوان خانگی: ' + appt.pet_name + ' · ' : ''}
              ${formatDate(appt.appointment_date)} · ساعت ${appt.appointment_time?.slice(0,5) || ''}
            </p>
            ${doctorName ? `<p class="text-xs text-ink/40 mt-1">دامپزشک: ${doctorName}${doctorSpecialty ? ' (' + doctorSpecialty + ')' : ''}</p>` : ''}
            ${appt.notes ? `<p class="text-xs text-ink/40 mt-1">یادداشت: ${appt.notes}</p>` : ''}
          </div>
          ${actionButtons(appt)}
        </div>
      `;
    }).join('');

    list.querySelectorAll('.edit-btn').forEach(btn => {
      btn.addEventListener('click', () => openEditModal(btn.dataset.edit));
    });
    list.querySelectorAll('.cancel-btn').forEach(btn => {
      btn.addEventListener('click', () => cancelAppointment(btn.dataset.cancel));
    });
  }

  async function init() {
    // 1) check session
    const { data: { session } } = await supabaseClient.auth.getSession();

    if (!session) {
      window.location.href = 'auth.html';
      return;
    }

    const user = session.user;

    // 2) load profile name
    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('full_name')
      .eq('id', user.id)
      .single();

    if (profile?.full_name) {
      document.getElementById('userName').textContent = profile.full_name;
    }

    // 3) load appointments
    const { data: appointments, error } = await supabaseClient
      .from('appointments')
      .select(`
        id, pet_name, appointment_date, appointment_time, status, notes, doctor_id,
        services ( title, duration_minutes ),
        doctors ( specialty, profiles ( full_name ) )
      `)
      .eq('patient_id', user.id)
      .order('appointment_date', { ascending: true })
      .order('appointment_time', { ascending: true });

    document.getElementById('pageLoading').classList.add('hidden');
    document.getElementById('pageContent').classList.remove('hidden');

    if (error) {
      console.error(error);
      const errBox = document.getElementById('loadError');
      errBox.textContent = 'خطا در بارگذاری نوبت‌ها. لطفاً صفحه را دوباره بارگذاری کنید.';
      errBox.classList.remove('hidden');
      return;
    }

    renderAppointments(appointments);
    currentAppointments = appointments || [];
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'auth.html';
  });

  // ---------- CANCEL ----------
  async function cancelAppointment(id) {
    const ok = confirm('آیا از لغو این نوبت مطمئن هستید؟');
    if (!ok) return;

    const { error } = await supabaseClient
      .from('appointments')
      .update({ status: 'cancelled' })
      .eq('id', id);

    if (error) {
      console.error(error);
      alert('خطا در لغو نوبت. لطفاً دوباره تلاش کنید.');
      return;
    }

    const appt = currentAppointments.find(a => a.id == id);
    if (appt) appt.status = 'cancelled';
    renderAppointments(currentAppointments);
  }

  // ---------- EDIT ----------
  let editingAppt = null;

  function timeToMinutes(t) {
    const [h, m] = t.split(':').map(Number);
    return h * 60 + m;
  }
  function minutesToTime(mins) {
    const h = Math.floor(mins / 60).toString().padStart(2, '0');
    const m = (mins % 60).toString().padStart(2, '0');
    return `${h}:${m}`;
  }

  function openEditModal(id) {
    editingAppt = currentAppointments.find(a => a.id == id);
    if (!editingAppt) return;

    document.getElementById('editDate').value = editingAppt.appointment_date;
    document.getElementById('editPetName').value = editingAppt.pet_name || '';
    document.getElementById('editNotes').value = editingAppt.notes || '';
    document.getElementById('editError').classList.add('hidden');
    document.getElementById('editModal').classList.remove('hidden');

    const today = new Date().toISOString().split('T')[0];
    JalaliUtil.attachPicker(
      document.getElementById('editDate'),
      document.getElementById('editDateMount'),
      { minDateISO: today }
    );

    loadEditSlots(editingAppt.appointment_date, editingAppt.appointment_time?.slice(0,5));
  }

  function closeEditModal() {
    document.getElementById('editModal').classList.add('hidden');
    editingAppt = null;
  }

  document.getElementById('closeModalBtn').addEventListener('click', closeEditModal);

  document.getElementById('editDate').addEventListener('change', (e) => {
    loadEditSlots(e.target.value, null);
  });

  let selectedEditTime = null;

  async function loadEditSlots(date, preselectTime) {
    const slotsWrap = document.getElementById('editSlots');
    selectedEditTime = preselectTime || null;
    slotsWrap.innerHTML = '<p class="text-xs text-ink/40 col-span-full">در حال بررسی ساعت‌های نوبت‌دهی...</p>';

    if (!date) { slotsWrap.innerHTML = ''; return; }

    const weekday = new Date(date + 'T00:00:00').getDay();

    const { data: availability } = await supabaseClient
      .from('doctor_availability')
      .select('start_time, end_time')
      .eq('doctor_id', editingAppt.doctor_id)
      .eq('weekday', weekday);

    const { data: overrides } = await supabaseClient
      .from('doctor_date_overrides')
      .select('start_time, end_time')
      .eq('doctor_id', editingAppt.doctor_id)
      .eq('specific_date', date);

    const allWindows = [...(availability || []), ...(overrides || [])];

    if (allWindows.length === 0) {
      slotsWrap.innerHTML = `<p class="text-xs text-ink/40 col-span-full">دامپزشک روزهای ${JalaliUtil.weekdayFaFromIso(date)} نوبت‌دهی ندارد.</p>`;
      return;
    }

    const { data: booked } = await supabaseClient
      .from('appointments')
      .select('appointment_time')
      .eq('doctor_id', editingAppt.doctor_id)
      .eq('appointment_date', date)
      .neq('status', 'cancelled')
      .neq('id', editingAppt.id);

    const bookedTimes = new Set((booked || []).map(b => b.appointment_time?.slice(0,5)));

    let allSlots = [];
    allWindows.forEach(win => {
      let start = timeToMinutes(win.start_time);
      const end = timeToMinutes(win.end_time);
      while (start + 30 <= end) {
        allSlots.push(minutesToTime(start));
        start += 30;
      }
    });
    allSlots = [...new Set(allSlots)].sort();

    if (allSlots.length === 0) {
      slotsWrap.innerHTML = '<p class="text-xs text-ink/40 col-span-full">در این روز نوبت خالی وجود ندارد.</p>';
      return;
    }

    slotsWrap.innerHTML = allSlots.map(s => {
      const isBooked = bookedTimes.has(s);
      const isSelected = s === selectedEditTime;
      return `
        <button
          data-time="${s}"
          ${isBooked ? 'disabled' : ''}
          class="edit-slot-btn px-1.5 py-2 rounded-lg border text-xs font-bold transition-all
            ${isBooked
              ? 'bg-ink/[0.06] text-ink/25 border-ink/[0.06] cursor-not-allowed'
              : isSelected
                ? 'bg-forest text-white border-forest'
                : 'bg-white text-ink/70 border-ink/10 hover:border-forest/40 cursor-pointer'}">
          ${s}
        </button>
      `;
    }).join('');

    slotsWrap.querySelectorAll('.edit-slot-btn:not([disabled])').forEach(btn => {
      btn.addEventListener('click', () => {
        selectedEditTime = btn.dataset.time;
        loadEditSlots(date, selectedEditTime);
      });
    });
  }

  document.getElementById('saveEditBtn').addEventListener('click', async () => {
    const errorBox = document.getElementById('editError');
    errorBox.classList.add('hidden');

    const newDate = document.getElementById('editDate').value;
    const petName = document.getElementById('editPetName').value.trim();
    const notes = document.getElementById('editNotes').value.trim();

    if (!newDate || !selectedEditTime) {
      errorBox.textContent = 'لطفاً تاریخ و ساعت را انتخاب کنید.';
      errorBox.classList.remove('hidden');
      return;
    }
    if (!petName) {
      errorBox.textContent = 'لطفاً نام حیوان خانگی را وارد کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    const btn = document.getElementById('saveEditBtn');
    btn.disabled = true;
    btn.textContent = 'در حال ذخیره...';

    const { error } = await supabaseClient
      .from('appointments')
      .update({
        appointment_date: newDate,
        appointment_time: selectedEditTime,
        pet_name: petName,
        notes: notes || null,
      })
      .eq('id', editingAppt.id);

    btn.disabled = false;
    btn.textContent = 'ذخیره تغییرات';

    if (error) {
      console.error(error);
      errorBox.textContent = 'خطا در ذخیره تغییرات. ممکن است این ساعت هم‌اکنون رزرو شده باشد.';
      errorBox.classList.remove('hidden');
      return;
    }

    editingAppt.appointment_date = newDate;
    editingAppt.appointment_time = selectedEditTime;
    editingAppt.pet_name = petName;
    editingAppt.notes = notes || null;

    closeEditModal();
    renderAppointments(currentAppointments);
  });

  init();
</script>

</body>
</html>
