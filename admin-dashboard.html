<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>داشبورد مدیریت | نیک‌پلاس</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { vazir: ['Vazirmatn', 'sans-serif'] },
        colors: {
          cream: '#FAF9F5',
          ink: '#16231F',
          forest: '#1F5C52',
          forestDark: '#153F38',
          sage: '#7FA793',
          lagoon: '#4E9C93',
          mist: '#E7EFE9',
          coral: '#E8926A',
        }
      }
    }
  }
</script>
<style>
  * { font-family: 'Vazirmatn', sans-serif; }
  .spinner {
    border: 3px solid rgba(31,92,82,0.15);
    border-top-color: #1F5C52;
    border-radius: 50%;
    width: 28px; height: 28px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .filter-tab.active { background: #1F5C52; color: white; }
</style>
</head>
<body class="bg-cream text-ink antialiased min-h-screen">

<!-- ===================== NAVBAR ===================== -->
<header class="sticky top-0 z-50 bg-cream/85 backdrop-blur-md border-b border-ink/[0.06]">
  <div class="max-w-5xl mx-auto px-6 h-20 flex items-center justify-between">
    <div class="flex items-center gap-2.5">
      <svg width="30" height="30" viewBox="0 0 40 40" fill="none">
        <circle cx="20" cy="20" r="19" stroke="#1F5C52" stroke-width="1.4"/>
        <path d="M13 22c0-4 3-7 7-7s7 3 7 7-3 5-7 5-7-1-7-5Z" fill="#1F5C52"/>
        <circle cx="14.5" cy="14" r="2.1" fill="#1F5C52"/>
        <circle cx="19.5" cy="11.5" r="2.1" fill="#1F5C52"/>
        <circle cx="25.5" cy="14" r="2.1" fill="#1F5C52"/>
      </svg>
      <span class="text-lg font-extrabold tracking-tight text-forestDark">نیک‌پلاس <span id="roleTag" class="text-xs font-bold text-forest bg-mist px-2 py-1 rounded-full align-middle"></span></span>
    </div>
    <button id="logoutBtn" class="flex items-center gap-2 text-sm font-bold text-ink/60 hover:text-red-600 transition-colors">
      خروج از حساب
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
    </button>
  </div>
</header>

<!-- ===================== LOADING ===================== -->
<div id="pageLoading" class="flex flex-col items-center justify-center py-32 gap-4">
  <div class="spinner"></div>
  <p class="text-sm text-ink/40">در حال بارگذاری...</p>
</div>

<!-- ===================== ACCESS DENIED ===================== -->
<div id="accessDenied" class="hidden flex-col items-center justify-center py-32 gap-3 text-center px-6">
  <p class="text-ink/60 font-bold">دسترسی شما به این صفحه مجاز نیست.</p>
  <a href="dashboard.html" class="text-forest font-bold text-sm hover:underline">بازگشت به داشبورد</a>
</div>

<!-- ===================== MAIN ===================== -->
<main id="pageContent" class="hidden max-w-5xl mx-auto px-6 py-10">

  <h1 class="text-2xl font-extrabold text-forestDark mb-1">مدیریت نوبت‌ها</h1>
  <p id="subtitle" class="text-sm text-ink/45 mb-8"></p>

  <!-- filter tabs -->
  <div class="flex flex-wrap gap-2 mb-7">
    <button data-filter="all" class="filter-tab active px-4 py-2 rounded-xl text-sm font-bold bg-mist text-ink/60 transition-colors">همه</button>
    <button data-filter="pending" class="filter-tab px-4 py-2 rounded-xl text-sm font-bold bg-mist text-ink/60 transition-colors">در انتظار تایید</button>
    <button data-filter="confirmed" class="filter-tab px-4 py-2 rounded-xl text-sm font-bold bg-mist text-ink/60 transition-colors">تایید شده</button>
    <button data-filter="completed" class="filter-tab px-4 py-2 rounded-xl text-sm font-bold bg-mist text-ink/60 transition-colors">انجام شده</button>
    <button data-filter="cancelled" class="filter-tab px-4 py-2 rounded-xl text-sm font-bold bg-mist text-ink/60 transition-colors">لغو شده</button>
  </div>

  <div id="appointmentsList" class="space-y-4"></div>
  <p id="emptyState" class="hidden text-center text-ink/40 py-16 bg-white rounded-[2rem] border border-ink/[0.06]">نوبتی در این دسته وجود ندارد.</p>
  <p id="loadError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3 mt-4"></p>

</main>

<script src="supabase-client.js"></script>
<script>
  let allAppointments = [];
  let currentFilter = 'all';
  let myRole = null;

  const statusMap = {
    pending:   { label: 'در انتظار تایید', classes: 'bg-amber-50 text-amber-700' },
    confirmed: { label: 'تایید شده',       classes: 'bg-mist text-forest' },
    completed: { label: 'انجام شده',       classes: 'bg-ink/[0.06] text-ink/50' },
    cancelled: { label: 'لغو شده',         classes: 'bg-red-50 text-red-600' },
  };

  function formatDate(dateStr) {
    try {
      return new Date(dateStr).toLocaleDateString('fa-IR', { year: 'numeric', month: 'long', day: 'numeric' });
    } catch { return dateStr; }
  }

  function actionButtons(appt) {
    if (appt.status === 'pending') {
      return `
        <button data-action="confirmed" data-id="${appt.id}" class="action-btn px-3.5 py-2 rounded-lg text-xs font-bold bg-forest text-white hover:bg-forestDark transition-colors">تایید نوبت</button>
        <button data-action="cancelled" data-id="${appt.id}" class="action-btn px-3.5 py-2 rounded-lg text-xs font-bold bg-red-50 text-red-600 hover:bg-red-100 transition-colors">رد کردن</button>
      `;
    }
    if (appt.status === 'confirmed') {
      return `
        <button data-action="completed" data-id="${appt.id}" class="action-btn px-3.5 py-2 rounded-lg text-xs font-bold bg-ink/[0.06] text-ink/60 hover:bg-ink/10 transition-colors">علامت‌گذاری به‌عنوان انجام‌شده</button>
        <button data-action="cancelled" data-id="${appt.id}" class="action-btn px-3.5 py-2 rounded-lg text-xs font-bold bg-red-50 text-red-600 hover:bg-red-100 transition-colors">لغو نوبت</button>
      `;
    }
    return '';
  }

  function renderList() {
    const list = document.getElementById('appointmentsList');
    const empty = document.getElementById('emptyState');

    const filtered = currentFilter === 'all'
      ? allAppointments
      : allAppointments.filter(a => a.status === currentFilter);

    if (filtered.length === 0) {
      list.innerHTML = '';
      empty.classList.remove('hidden');
      return;
    }
    empty.classList.add('hidden');

    list.innerHTML = filtered.map(appt => {
      const status = statusMap[appt.status] || { label: appt.status || 'نامشخص', classes: 'bg-ink/[0.06] text-ink/50' };
      return `
        <div class="bg-white rounded-2xl border border-ink/[0.06] p-6">
          <div class="flex flex-wrap items-center gap-2.5 mb-2">
            <h3 class="font-bold text-forestDark">${appt.serviceTitle}</h3>
            <span class="text-xs font-bold px-2.5 py-1 rounded-full ${status.classes}">${status.label}</span>
          </div>
          <p class="text-sm text-ink/55">
            بیمار: ${appt.patientName} ${appt.pet_name ? '· حیوان خانگی: ' + appt.pet_name : ''}
          </p>
          <p class="text-sm text-ink/55 mt-1">
            ${formatDate(appt.appointment_date)} · ساعت ${appt.appointment_time?.slice(0,5) || ''}
            ${myRole === 'admin' ? ' · دامپزشک: ' + appt.doctorName : ''}
          </p>
          ${appt.notes ? `<p class="text-xs text-ink/40 mt-1">یادداشت: ${appt.notes}</p>` : ''}
          <div class="flex flex-wrap gap-2 mt-4">${actionButtons(appt)}</div>
        </div>
      `;
    }).join('');

    list.querySelectorAll('.action-btn').forEach(btn => {
      btn.addEventListener('click', () => updateStatus(btn.dataset.id, btn.dataset.action));
    });
  }

  async function updateStatus(id, newStatus) {
    const { error } = await supabaseClient
      .from('appointments')
      .update({ status: newStatus })
      .eq('id', id);

    if (error) {
      console.error(error);
      alert('خطا در به‌روزرسانی وضعیت نوبت. لطفاً دوباره تلاش کنید.');
      return;
    }

    const appt = allAppointments.find(a => a.id == id);
    if (appt) appt.status = newStatus;
    renderList();
  }

  document.querySelectorAll('.filter-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      currentFilter = tab.dataset.filter;
      renderList();
    });
  });

  async function loadAppointments(user) {
    let query = supabaseClient
      .from('appointments')
      .select('id, patient_id, doctor_id, service_id, pet_name, appointment_date, appointment_time, status, notes')
      .order('appointment_date', { ascending: true })
      .order('appointment_time', { ascending: true });

    if (myRole === 'doctor') {
      query = query.eq('doctor_id', user.id);
    }

    const { data: appointments, error } = await query;

    if (error) {
      console.error(error);
      document.getElementById('loadError').textContent = 'خطا در بارگذاری نوبت‌ها.';
      document.getElementById('loadError').classList.remove('hidden');
      return;
    }

    if (!appointments || appointments.length === 0) {
      allAppointments = [];
      renderList();
      return;
    }

    // client-side joins: patients, doctors, services
    const patientIds = [...new Set(appointments.map(a => a.patient_id))];
    const doctorIds = [...new Set(appointments.map(a => a.doctor_id))];
    const serviceIds = [...new Set(appointments.map(a => a.service_id))];

    const [{ data: patients }, { data: doctors }, { data: services }] = await Promise.all([
      supabaseClient.from('profiles').select('id, full_name').in('id', patientIds),
      supabaseClient.from('doctors').select('id, profiles ( full_name )').in('id', doctorIds),
      supabaseClient.from('services').select('id, title').in('id', serviceIds),
    ]);

    const patientMap = new Map((patients || []).map(p => [p.id, p.full_name]));
    const doctorMap = new Map((doctors || []).map(d => [d.id, d.profiles?.full_name]));
    const serviceMap = new Map((services || []).map(s => [s.id, s.title]));

    allAppointments = appointments.map(a => ({
      ...a,
      patientName: patientMap.get(a.patient_id) || 'نامشخص',
      doctorName: doctorMap.get(a.doctor_id) || 'نامشخص',
      serviceTitle: serviceMap.get(a.service_id) || 'خدمت نامشخص',
    }));

    renderList();
  }

  async function init() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (!session) {
      window.location.href = 'auth.html';
      return;
    }
    const user = session.user;

    const { data: profile } = await supabaseClient
      .from('profiles')
      .select('role')
      .eq('id', user.id)
      .single();

    myRole = profile?.role;

    document.getElementById('pageLoading').classList.add('hidden');

    if (myRole !== 'admin' && myRole !== 'doctor') {
      document.getElementById('accessDenied').classList.remove('hidden');
      document.getElementById('accessDenied').classList.add('flex');
      return;
    }

    document.getElementById('roleTag').textContent = myRole === 'admin' ? 'ادمین' : 'پزشک';
    document.getElementById('subtitle').textContent = myRole === 'admin'
      ? 'مشاهده و مدیریت همه نوبت‌های ثبت‌شده در کلینیک'
      : 'مشاهده و مدیریت نوبت‌های مربوط به شما';

    document.getElementById('pageContent').classList.remove('hidden');

    await loadAppointments(user);
  }

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await supabaseClient.auth.signOut();
    window.location.href = 'auth.html';
  });

  init();
</script>

</body>
</html>
