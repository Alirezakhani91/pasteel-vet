<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ورود یا ثبت‌نام | پاستیل</title>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: {
      extend: {
        fontFamily: { vazir: ['Vazirmatn', 'sans-serif'] },
        colors: {
          cream: '#FAF9F5',
          ink: '#16231F',
          forest: '#1F5C52',
          forestDark: '#153F38',
          sage: '#7FA793',
          lagoon: '#4E9C93',
          mist: '#E7EFE9',
          coral: '#E8926A',
        }
      }
    }
  }
</script>
<style>
  * { font-family: 'Vazirmatn', sans-serif; }
  .tab-active { background: #1F5C52; color: white; }
  .spinner {
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: white;
    border-radius: 50%;
    width: 16px; height: 16px;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body class="bg-cream text-ink antialiased min-h-screen flex items-center justify-center px-4 py-10">

<div class="w-full max-w-md">

  <!-- logo -->
  <div class="flex items-center justify-center gap-2.5 mb-8">
    <svg width="34" height="34" viewBox="0 0 40 40" fill="none">
      <circle cx="20" cy="20" r="19" stroke="#1F5C52" stroke-width="1.4"/>
      <path d="M13 22c0-4 3-7 7-7s7 3 7 7-3 5-7 5-7-1-7-5Z" fill="#1F5C52"/>
      <circle cx="14.5" cy="14" r="2.1" fill="#1F5C52"/>
      <circle cx="19.5" cy="11.5" r="2.1" fill="#1F5C52"/>
      <circle cx="25.5" cy="14" r="2.1" fill="#1F5C52"/>
    </svg>
    <span class="text-xl font-extrabold tracking-tight text-forestDark">پاستیل</span>
  </div>

  <div class="bg-white rounded-[2rem] border border-ink/[0.06] shadow-xl shadow-forest/[0.06] p-8">

    <!-- tabs -->
    <div class="flex bg-mist rounded-2xl p-1.5 mb-7">
      <button id="tabLogin" class="tab-active flex-1 py-2.5 rounded-xl text-sm font-bold transition-colors">ورود</button>
      <button id="tabSignup" class="flex-1 py-2.5 rounded-xl text-sm font-bold text-ink/60 transition-colors">ثبت‌نام</button>
    </div>

    <!-- ============= LOGIN FORM ============= -->
    <form id="loginForm" class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">شماره موبایل</label>
        <input
          type="tel"
          id="loginPhone"
          required
          inputmode="numeric"
          autocomplete="tel"
          maxlength="11"
          placeholder="09121234567"
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm"
          dir="ltr"
        >
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">رمز عبور</label>
        <input type="password" id="loginPassword" required placeholder="••••••••"
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm" dir="ltr">
        <p class="text-[11px] text-ink/40 mt-1.5">
          شماره موبایل و رمز عبور ثابت حساب خود را وارد کنید.
        </p>
      </div>

      <p id="loginError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3"></p>

      <button type="submit" id="loginBtn"
        class="w-full bg-forest hover:bg-forestDark text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-forest/25 flex items-center justify-center gap-2">
        <span>ورود به حساب کاربری</span>
      </button>
    </form>

    <!-- ============= SIGNUP FORM ============= -->
    <form id="signupForm" class="space-y-4 hidden">
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">نام و نام خانوادگی</label>
        <input type="text" id="signupName" required placeholder="مثلاً: سارا احمدی"
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm">
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">شماره موبایل</label>
        <input
          type="tel"
          id="signupPhone"
          required
          inputmode="numeric"
          autocomplete="tel"
          maxlength="11"
          placeholder="09121234567"
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm"
          dir="ltr"
        >
        <p class="text-[11px] text-ink/40 mt-1.5">
          شماره را به شکل 09xxxxxxxxx وارد کنید.
        </p>
      </div>
      <div>
        <label class="block text-sm font-bold text-forestDark mb-1.5">رمز عبور</label>
        <input type="password" id="signupPassword" required minlength="6" placeholder="حداقل ۶ کاراکتر"
          class="w-full px-4 py-3 rounded-xl border border-ink/10 focus:border-forest focus:ring-2 focus:ring-forest/20 outline-none transition-all text-sm" dir="ltr">
      </div>

      <p id="signupError" class="hidden text-sm text-red-600 bg-red-50 rounded-xl px-4 py-3"></p>
      <p id="signupSuccess" class="hidden text-sm text-forest bg-mist rounded-xl px-4 py-3"></p>

      <button type="submit" id="signupBtn"
        class="w-full bg-forest hover:bg-forestDark text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-forest/25 flex items-center justify-center gap-2">
        <span>ساخت حساب کاربری</span>
      </button>
    </form>

  </div>

  <p class="text-center text-xs text-ink/40 mt-6">
    با ورود یا ثبت‌نام، قوانین و مقررات پاستیل را می‌پذیرید.
  </p>
</div>

<script src="supabase-client.js"></script>
<script>
  // اگر کاربر از قبل لاگین کرده باشد، دیگر فرم ورود نشانش نمی‌دهیم؛
  // مستقیم به صفحه‌ی اول برمی‌گردد (چون آنجا وضعیت لاگین را نشان می‌دهد)
  (async function checkExistingSession() {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session) {
      window.location.href = 'index.html';
    }
  })();
</script>
<script>
  // ---------- tab switching ----------
  const tabLogin = document.getElementById('tabLogin');
  const tabSignup = document.getElementById('tabSignup');
  const loginForm = document.getElementById('loginForm');
  const signupForm = document.getElementById('signupForm');

  tabLogin.addEventListener('click', () => {
    tabLogin.classList.add('tab-active');
    tabLogin.classList.remove('text-ink/60');
    tabSignup.classList.remove('tab-active');
    tabSignup.classList.add('text-ink/60');
    loginForm.classList.remove('hidden');
    signupForm.classList.add('hidden');
  });

  tabSignup.addEventListener('click', () => {
    tabSignup.classList.add('tab-active');
    tabSignup.classList.remove('text-ink/60');
    tabLogin.classList.remove('tab-active');
    tabLogin.classList.add('text-ink/60');
    signupForm.classList.remove('hidden');
    loginForm.classList.add('hidden');
  });

  // ---------- helper: button loading state ----------
  function setLoading(btn, loading, label) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<span class="spinner"></span><span>در حال پردازش...</span>`
      : `<span>${label}</span>`;
  }

  // ---------- PHONE HELPERS ----------
  function toEnglishDigits(value) {
    const persianDigits = '۰۱۲۳۴۵۶۷۸۹';
    const arabicDigits = '٠١٢٣٤٥٦٧٨٩';

    return String(value || '')
      .replace(/[۰-۹]/g, digit => persianDigits.indexOf(digit))
      .replace(/[٠-٩]/g, digit => arabicDigits.indexOf(digit));
  }

  function normalizeIranMobile(value) {
    let phone = toEnglishDigits(value)
      .trim()
      .replace(/[^\d+]/g, '');

    // 0098912... -> +98912...
    if (phone.startsWith('0098')) {
      phone = '+' + phone.slice(2);
    }

    // 98912... -> +98912...
    if (phone.startsWith('98') && !phone.startsWith('+98')) {
      phone = '+' + phone;
    }

    // 0912... -> +98912...
    if (/^09\d{9}$/.test(phone)) {
      return {
        valid: true,
        local: phone,
        international: '+98' + phone.slice(1)
      };
    }

    // +98912... -> local 0912...
    if (/^\+989\d{9}$/.test(phone)) {
      return {
        valid: true,
        local: '0' + phone.slice(3),
        international: phone
      };
    }

    return {
      valid: false,
      local: '',
      international: ''
    };
  }

  // کاربر این ایمیل را نمی‌بیند.
  // برای هر شماره موبایل، یک شناسه داخلی ثابت و یکتا ساخته می‌شود.
  function phoneToInternalEmail(normalizedPhone) {
    const digits = normalizedPhone.international.replace(/\D/g, '');
    return `${digits}@phone.pasteel.app`;
  }

  function translateAuthError(error, mode) {
    const message = String(error?.message || '').toLowerCase();
    const code = String(error?.code || '').toLowerCase();

    if (
      message.includes('already registered') ||
      message.includes('already been registered') ||
      message.includes('user already registered')
    ) {
      return 'این شماره موبایل قبلاً ثبت‌نام کرده است.';
    }

    if (
      message.includes('invalid login credentials') ||
      message.includes('invalid credentials')
    ) {
      return 'شماره موبایل یا رمز عبور اشتباه است.';
    }

    if (message.includes('password')) {
      return 'رمز عبور معتبر نیست. رمز باید حداقل ۶ کاراکتر داشته باشد.';
    }

    return mode === 'login'
      ? 'ورود انجام نشد. شماره موبایل و رمز عبور را بررسی کنید.'
      : 'ثبت‌نام انجام نشد. لطفاً دوباره تلاش کنید.';
  }

  // ورودی شماره موبایل فقط اعداد را نگه می‌دارد.
  ['loginPhone', 'signupPhone'].forEach(inputId => {
    const input = document.getElementById(inputId);
    if (!input) return;

    input.addEventListener('input', () => {
      input.value = toEnglishDigits(input.value)
        .replace(/\D/g, '')
        .slice(0, 11);
    });
  });

  // ---------- LOGIN WITH PHONE + PASSWORD ----------
  loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const errorBox = document.getElementById('loginError');
    errorBox.classList.add('hidden');

    const normalizedPhone = normalizeIranMobile(
      document.getElementById('loginPhone').value
    );
    const password = document.getElementById('loginPassword').value;
    const btn = document.getElementById('loginBtn');

    if (!normalizedPhone.valid) {
      errorBox.textContent = 'شماره موبایل معتبر نیست. شماره را به شکل 09121234567 وارد کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    setLoading(btn, true);

    const internalEmail = phoneToInternalEmail(normalizedPhone);

    const { error } = await supabaseClient.auth.signInWithPassword({
      email: internalEmail,
      password
    });

    setLoading(btn, false, 'ورود به حساب کاربری');

    if (error) {
      errorBox.textContent = translateAuthError(error, 'login');
      errorBox.classList.remove('hidden');
      return;
    }

    window.location.href = 'index.html';
  });

  // ---------- SIGNUP WITH PHONE + FIXED PASSWORD ----------
  signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const errorBox = document.getElementById('signupError');
    const successBox = document.getElementById('signupSuccess');

    errorBox.classList.add('hidden');
    successBox.classList.add('hidden');

    const fullName = document.getElementById('signupName').value.trim();
    const normalizedPhone = normalizeIranMobile(
      document.getElementById('signupPhone').value
    );
    const password = document.getElementById('signupPassword').value;
    const btn = document.getElementById('signupBtn');

    if (!fullName) {
      errorBox.textContent = 'نام و نام خانوادگی را وارد کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    if (!normalizedPhone.valid) {
      errorBox.textContent = 'شماره موبایل معتبر نیست. شماره را به شکل 09121234567 وارد کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    setLoading(btn, true);

    const internalEmail = phoneToInternalEmail(normalizedPhone);

    // در ظاهر فقط شماره موبایل دریافت می‌شود.
    // Supabase پشت‌صحنه از یک ایمیل داخلی ساخته‌شده از شماره استفاده می‌کند.
    const { data, error } = await supabaseClient.auth.signUp({
      email: internalEmail,
      password,
      options: {
        data: {
          full_name: fullName,
          phone: normalizedPhone.local,
          role: 'patient',
          login_method: 'mobile_password'
        }
      }
    });

    if (error) {
      setLoading(btn, false, 'ساخت حساب کاربری');
      errorBox.textContent = translateAuthError(error, 'signup');
      errorBox.classList.remove('hidden');
      return;
    }

    if (!data?.user?.id) {
      setLoading(btn, false, 'ساخت حساب کاربری');
      errorBox.textContent = 'حساب کاربری ساخته نشد. لطفاً دوباره تلاش کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    // برای ورود فوری، Confirm email باید در Supabase خاموش باشد.
    if (!data.session) {
      setLoading(btn, false, 'ساخت حساب کاربری');
      errorBox.textContent =
        'حساب ساخته شد اما ورود خودکار انجام نشد. در Supabase گزینه Confirm email را خاموش کنید.';
      errorBox.classList.remove('hidden');
      return;
    }

    // ذخیره شماره به شکل خوانای ایران در جدول profiles
    const { error: profileError } = await supabaseClient
      .from('profiles')
      .insert({
        id: data.user.id,
        full_name: fullName,
        phone: normalizedPhone.local,
        role: 'patient'
      });

    setLoading(btn, false, 'ساخت حساب کاربری');

    if (profileError) {
      errorBox.textContent = 'حساب ساخته شد ولی ذخیره اطلاعات پروفایل انجام نشد.';
      errorBox.classList.remove('hidden');
      console.error('Profile insert error:', profileError);
      return;
    }

    window.location.href = 'index.html';
  });
</script>

</body>
</html>
